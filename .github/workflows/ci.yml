name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy

      - name: Run ruff
        run: ruff check r2morph tests

      - name: Run black (check only)
        run: black --check r2morph tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy r2morph --ignore-missing-imports || true

  stable-tests:
    name: Stable Core Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential pkg-config

      - name: Install radare2
        run: |
          git clone --depth 1 https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          sys/install.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-cov

      - name: Run stable core tests with coverage
        run: |
          python -m pytest -v --cov=r2morph --cov-report=xml --cov-report=term-missing \
            -m "stable or unit" --ignore=tests/product_smoke --ignore=tests/slow

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: stable
          fail_ci_if_error: false

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential pkg-config

      - name: Install radare2
        run: |
          git clone --depth 1 https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          sys/install.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          python -m pytest -v tests/unit -m "not slow" --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential pkg-config

      - name: Install radare2
        run: |
          git clone --depth 1 https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          sys/install.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests
        run: |
          python -m pytest -v tests/integration -m "not slow" --tb=short

  product-smoke-tests:
    name: Product Smoke Tests (Stable Mutations)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential pkg-config

      - name: Install radare2
        run: |
          git clone --depth 1 https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          sys/install.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run product smoke tests
        run: |
          python -m pytest -v tests/product_smoke -m "stable" --tb=short

  cross-platform-tests:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-14]
        python-version: ["3.11", "3.12", "3.13"]
        exclude:
          - os: macos-14
            python-version: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config || true

      - name: Install radare2 (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          git clone --depth 1 https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          sys/install.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          python -m pytest -v -m "not experimental and not product_smoke and not slow" --tb=short

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: .coverage
          flags: cross-platform
          fail_ci_if_error: false

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [stable-tests, cross-platform-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: coverage-*
          path: coverage-reports

      - name: Upload combined coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-reports/**/coverage.xml
          fail_ci_if_error: false