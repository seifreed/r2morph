name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        env:
          TAG_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          package_version = pyproject["project"]["version"]
          tag_version = os.environ["TAG_VERSION"]

          if package_version != tag_version:
              raise SystemExit(
                  f"Tag version v{tag_version} does not match pyproject.toml version {package_version}"
              )

          print(f"Release version validated: {tag_version}")
          PY

  build:
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    runs-on: ubuntu-latest
    needs: [validate-release, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential pkg-config

      - name: Install radare2
        run: |
          git clone --depth 1 https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          sys/install.sh

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install package
        run: pip install dist/*.whl

      - name: Install test dependencies
        run: pip install pytest pytest-cov hypothesis networkx z3-solver claripy

      - name: Run tests
        run: python -m pytest tests/unit -m "not slow" --tb=short

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [validate-release, build, test]
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/project/r2morph/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  create-release:
    runs-on: ubuntu-latest
    needs: [validate-release, build, test, publish-pypi]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate release checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.whl > SHA256SUMS

      - name: Generate changelog
        id: changelog
        env:
          RELEASE_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          if [ -f CHANGELOG.md ]; then
            awk -v version="$RELEASE_VERSION" '
              $0 ~ "^## \\[" version "\\]" { capture=1 }
              capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" { exit }
              capture { print }
            ' CHANGELOG.md > /tmp/changes.md
          fi

          if [ ! -s /tmp/changes.md ]; then
            echo "Release $RELEASE_VERSION" > /tmp/changes.md
          fi

          cat /tmp/changes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*
          body_path: /tmp/changes.md
          draft: false
          prerelease: ${{ contains(needs.validate-release.outputs.version, '-') }}
          generate_release_notes: true
